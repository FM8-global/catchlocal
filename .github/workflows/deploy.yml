name: Test & Deploy — Catch Local
on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Restore test files
        run: |
          mkdir -p tests
          echo "" | base64 -d > tests/invariants.test.mjs
          echo "" | base64 -d > tests/smoke.spec.js
          echo "" | base64 -d > playwright.config.js
      - name: Invariant checks (gate)
        run: node tests/invariants.test.mjs
      - name: Smoke tests (Playwright)
        run: |
          npm init -y >/dev/null 2>&1
          npm i -D @playwright/test http-server --no-audit --no-fund
          npx playwright install --with-deps chromium
          npx playwright test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Package site
        run: |
          mkdir -p _site
          rsync -a --exclude '.git' --exclude '.github' --exclude 'tests' \
                --exclude 'node_modules' --exclude 'package*.json' \
                --exclude 'playwright.config.js' --exclude 'README-CI.md' ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with: { path: _site }
      - id: deployment
        uses: actions/deploy-pages@v4
